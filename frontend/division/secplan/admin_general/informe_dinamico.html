    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: '#6366f1',
                        secondary: '#ec4899',
                        accent: '#8b5cf6',
                    }
                }

        }

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Highcharts core and modules -->

    <style>
        :root {
            --gradient-primary: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08);
        }

        .header-gradient {
            background: var(--gradient-primary);
            border-radius: 1.5rem;
            padding: 2rem;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.5);
        }

        #chartContainer {
            height: 600px;
            width: 100%;
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .category-checkbox {
            display: none;
        }

        .category-label {
            display: inline-flex;
            align-items: center;
            padding: 0.5rem 1rem;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .category-checkbox:checked+.category-label {
            background: #6366f1;
            border-color: #6366f1;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
        }

        .category-label:hover {
            border-color: #6366f1;
        }

        /* Estilos UI para Listas de Filtros Modernos (BI Style) */
        .filter-ribbon {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }

        .filter-pill {
            position: relative;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            padding: 0.4rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            user-select: none;
            min-width: 120px;
        }

        .filter-pill:hover {
            border-color: #6366f1;
            background: #f8fafc;
        }

        .filter-pill.active {
            background: #eef2ff;
            border-color: #6366f1;
            color: #4f46e5;
        }

        .filter-popover {
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            width: 240px;
            max-height: 300px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 0.75rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 100;
            overflow-y: auto;
            padding: 0.5rem;
            display: none;
        }

        .filter-pill.open .filter-popover {
            display: block;
        }

        .dropdown-arrow {
            font-size: 0.6rem;
            opacity: 0.5;
            margin-left: auto;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .filter-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .filter-item {
            display: flex;
            align-items: flex-start;
            padding: 0.5rem;
            border-radius: 0.375rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
            width: 100%;
        }

        .filter-item:hover {
            background-color: #f8fafc;
        }

        .filter-checkbox {
            margin-top: 0.15rem;
            margin-right: 0.75rem;
            accent-color: #6366f1;
            width: 1rem;
            height: 1rem;
            flex-shrink: 0;
        }

        .filter-text {
            font-size: 0.8rem;
            color: #1e293b;
            flex: 1;
            user-select: none;
            line-height: 1.2;
            word-break: break-word;
        }

        th.sortable {
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
            padding-right: 2rem !important;
        }

        th.sortable:hover {
            background-color: #f1f5f9;
        }

        .sort-icon {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.7rem;
            opacity: 1;
            color: #94a3b8;
        }

        th.sort-active .sort-icon {
            color: #6366f1;
            opacity: 1;
        }
    </style>
</head>

    <script src="../../../script/layout.js"></script>
    <script>
        let allProjects = [];
        let filteredProjects = [];
        let currentSort = { column: 0, direction: 'asc' };

        const currentFilters = {
            area: [], lineamiento: [], financiamiento: [], anno_elaboracion: [],
            anno_ejecucion: [], estado: [], etapa: [], estado_postulacion: [], profesional: []
        };

        const filterFieldMap = {
            'area': 'area_nombre', 'lineamiento': 'lineamiento_estrategico_nombre',
            'financiamiento': 'financiamiento_nombre', 'anno_elaboracion': 'anno_elaboracion',
            'anno_ejecucion': 'anno_ejecucion', 'estado': 'estado_nombre', 'etapa': 'etapa_nombre',
            'estado_postulacion': 'estado_postulacion_nombre', 'profesional': 'profesional_1'
        };

        async function fetchProjects() {
            try {
                allProjects = await api.get('/proyectos');
                filteredProjects = [...allProjects];
                populateFilters();
                applyFilters();
            } catch (error) {
                console.error('Error al cargar proyectos:', error);
                alert('Error al cargar datos: ' + (error.message || 'No se pudo conectar al servidor'));
            }
        }

        function limpiarFiltros() {
            Object.keys(currentFilters).forEach(k => currentFilters[k] = []);
            applyFilters();
        }

        const filterLabels = {
            area: 'Área', lineamiento: 'Línea', financiamiento: 'Financ.',
            anno_elaboracion: 'Elab.', anno_ejecucion: 'Ejec.', estado: 'Estado',
            etapa: 'Etapa', estado_postulacion: 'Post.', profesional: 'Prof.'
        };

        function toggleFilterDropdown(element, event) {
            event.stopPropagation();
            const isOpen = element.classList.contains('open');
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('open'));
            if (!isOpen) element.classList.add('open');
        }

        document.addEventListener('click', () => {
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('open'));
        });
        function populateFilters() {
            for (const [filterKey, dataKey] of Object.entries(filterFieldMap)) {
                const container = document.getElementById(`filter-${filterKey}`);
                const pill = container.parentElement;
                const labelElement = document.getElementById(`label-${filterKey}`);
                const currentVals = [...currentFilters[filterKey]];

                // Actualizar etiqueta del Pill
                if (currentVals.length === 0) {
                    labelElement.textContent = `${filterLabels[filterKey]}: Todas`;
                    pill.classList.remove('active');
                } else {
                    const labelStr = currentVals.length === 1 ? currentVals[0] : `${currentVals.length} sel.`;
                    labelElement.textContent = `${filterLabels[filterKey]}: ${labelStr}`;
                    pill.classList.add('active');
                }

                // Para las OPCIONES del dropdown, mostramos todo lo disponible en la DB
                // Trimmear opciones para evitar descalces por espacios
                const options = [...new Set(allProjects.map(p => String(p[dataKey] || '').trim()).filter(v => v))].sort();

                const isAllSelected = currentVals.length === 0;
                let html = `
                    <div class="filter-list p-1">
                        <label class="filter-item ${isAllSelected ? 'bg-indigo-50' : ''} mb-1 border-b pb-1">
                            <input type="checkbox" class="filter-checkbox" value="all" onchange="handleFilterChange('${filterKey}', this)" onclick="event.stopPropagation()" ${isAllSelected ? 'checked' : ''}>
                            <span class="filter-text font-bold text-indigo-700">-- VER TODAS --</span>
                        </label>
                `;

                options.forEach(opt => {
                    const optStr = String(opt);
                    const isSelected = currentVals.map(String).includes(optStr);

                    // Conteo cruzado: ¿Hay datos con este valor considerando el ribbon?
                    // Nota: Ignoramos los chips inferiores (selectedCats) aquí para evitar filtrado circular
                    const hasData = allProjects.some(p => {
                        const val = String(p[dataKey] || '').trim();
                        if (val !== optStr) return false;

                        return Object.entries(currentFilters).every(([fK, fV]) => {
                            if (fK === filterKey || fV.length === 0) return true;
                            const projectVal = String(p[filterFieldMap[fK]] || '').trim();
                            return fV.includes(projectVal);
                        });
                    });

                    html += `
                        <label class="filter-item ${isSelected ? 'bg-indigo-50/50' : ''} ${!hasData && !isSelected ? 'opacity-40' : ''}">
                            <input type="checkbox" class="filter-checkbox filter-${filterKey}-chk" value="${optStr}" onchange="handleFilterChange('${filterKey}', this)" onclick="event.stopPropagation()" ${isSelected ? 'checked' : ''}>
                            <span class="filter-text">${optStr} ${!hasData && !isSelected ? '<span class="text-[10px] opacity-60">(0)</span>' : ''}</span>
                        </label>
                    `;
                });

                html += '</div>';
                container.innerHTML = html;
            }
        }

        function handleFilterChange(filterType, element) {
            if (event) event.stopPropagation();

            if (element && element.value === 'all') {
                if (element.checked) currentFilters[filterType] = [];
            } else if (element) {
                const val = String(element.value);
                const resultSet = new Set(currentFilters[filterType]);

                if (element.checked) {
                    resultSet.add(val);
                } else {
                    resultSet.delete(val);
                }
                currentFilters[filterType] = Array.from(resultSet);
            }
            applyFilters();
        }

        function applyFilters() {
            filteredProjects = allProjects.filter(p => {
                return Object.entries(currentFilters).every(([fK, fV]) => {
                    if (fV.length === 0) return true;
                    const projectVal = String(p[filterFieldMap[fK]] || '').trim();
                    return fV.includes(projectVal);
                });
            });

            // IMPORTANTE: Primero actualizamos los chips inferiores para que el Ribbon
            // pueda leer el estado correcto de categorías seleccionadas.
            handleGroupByChange();
            populateFilters();
        }

        function handleGroupByChange() {
            if (!allProjects || allProjects.length === 0) return;
            const groupBy = document.getElementById('groupByField').value;

            // Obtenemos categorías basadas en el dataset COMPLETO para permitir navegación estable
            const categories = [...new Set(allProjects.map(p => p[groupBy] || 'Sin especificar'))].sort();

            const container = document.getElementById('categoryFilters');
            container.innerHTML = '';

            categories.forEach((cat, index) => {
                // Solo mostramos chips que tengan datos bajo el filtrado del RIBBON actual
                // pero si ya estaban seleccionados, los mantenemos para poder "limpiar"
                const hasData = filteredProjects.some(p => (p[groupBy] || 'Sin especificar') === cat);
                if (!hasData) return;

                const id = `cat-${index}`;
                container.innerHTML += `
                    <div class="relative">
                        <input type="checkbox" id="${id}" value="${cat}" class="category-checkbox" checked onchange="updateChartAndPills()">
                        <label for="${id}" class="category-label">${cat}</label>
                    </div>
                `;
            });

            updateChart();
        }

        function updateChartAndPills() {
            updateChart();
            populateFilters(); // Sincronización inversa: chips -> ribbon
        }

        function updateChart() {
            if (!filteredProjects || filteredProjects.length === 0) {
                if (window.Highcharts) Highcharts.chart('chartContainer', { title: { text: 'No hay proyectos que coincidan con los filtros' } });
                document.getElementById('dataTable').classList.add('hidden');
                return;
            }

            const groupBy = document.getElementById('groupByField').value;
            const metric = document.getElementById('metricType').value;
            const chartType = document.getElementById('chartType').value;

            // Obtener categorías seleccionadas
            const selectedCategories = Array.from(document.querySelectorAll('.category-checkbox:checked')).map(cb => cb.value);

            if (selectedCategories.length === 0) {
                Highcharts.chart('chartContainer', { title: { text: 'Seleccione al menos una categoría' } });
                return;
            }

            const fieldLabel = document.getElementById('groupByField').options[document.getElementById('groupByField').selectedIndex].text;
            const metricLabel = document.getElementById('metricType').options[document.getElementById('metricType').selectedIndex].text;

            const currentYear = new Date().getFullYear();
            const groupedRaw = {};

            // Filtrar proyectos por categorías seleccionadas
            const baseData = filteredProjects.filter(p => selectedCategories.includes(p[groupBy] || 'Sin especificar'));

            baseData.forEach(p => {
                let key = p[groupBy] || 'Sin especificar';
                if (!groupedRaw[key]) {
                    groupedRaw[key] = {
                        count: 0,
                        sum_monto: 0,
                        sum_avance: 0,
                        sum_ejecutado: 0,
                        sum_antiguedad: 0,
                        sum_profesionales: 0
                    };
                }

                const monto = parseFloat(p.monto) || 0;
                const avance = parseFloat(p.avance_total_porcentaje) || 0;
                const elabYear = parseInt(p.anno_elaboracion) || currentYear;

                // Contar profesionales no vacíos
                const profCount = [p.profesional_1, p.profesional_2, p.profesional_3].filter(pf => pf && pf.trim()).length;

                groupedRaw[key].count++;
                groupedRaw[key].sum_monto += monto;
                groupedRaw[key].sum_avance += avance;
                groupedRaw[key].sum_ejecutado += (monto * (avance / 100));
                groupedRaw[key].sum_antiguedad += (currentYear - elabYear);
                groupedRaw[key].sum_profesionales += profCount;
            });

            const processedData = Object.keys(groupedRaw).map(key => {
                const item = groupedRaw[key];
                let value = 0;

                switch (metric) {
                    case 'sum_monto': value = item.sum_monto; break;
                    case 'count': value = item.count; break;
                    case 'avg_monto': value = item.sum_monto / item.count; break;
                    case 'avg_avance': value = item.sum_avance / item.count; break;
                    case 'sum_ejecutado': value = item.sum_ejecutado; break;
                    case 'avg_antiguedad': value = item.sum_antiguedad / item.count; break;
                    case 'avg_profesionales': value = item.sum_profesionales / item.count; break;
                }

                return { name: key, y: value };
            }).sort((a, b) => b.y - a.y);

            const totalGlobal = processedData.reduce((acc, curr) => acc + curr.y, 0);

            // Inyectar el porcentaje relativo para el tooltip
            processedData.forEach(d => {
                d.percentage = (d.y / (totalGlobal || 1)) * 100;
            });

            renderChart(processedData, `${metricLabel} por ${fieldLabel}`, totalGlobal, chartType, metric);
            renderTable(processedData, fieldLabel, metricLabel, totalGlobal, metric);
        }

        function renderTable(data, categoryLabel, metricLabel, total, metric) {
            const tableDiv = document.getElementById('dataTable');
            const tbody = document.getElementById('tableBody');
            const thCategory = document.getElementById('th-category');
            const thValue = document.getElementById('th-value');
            const summaryText = document.getElementById('tableSummaryText');

            tableDiv.classList.remove('hidden');
            thCategory.innerHTML = `${categoryLabel.toUpperCase()} <i class="fas fa-sort sort-icon"></i>`;
            thValue.innerHTML = `${metricLabel.toUpperCase()} <i class="fas fa-sort sort-icon"></i>`;
            if (summaryText) {
                summaryText.textContent = `Total de ${data.length} categorías analizadas`;
            }

            const isCurrency = metric.includes('monto') || metric.includes('ejecutado');
            const isPercent = metric.includes('avance');
            const isAntiguedad = metric.includes('antiguedad');
            const isCount = metric === 'count' || metric.includes('profesionales');

            const valueSuffix = isPercent ? '%' : (isAntiguedad ? ' años' : (isCount ? ' proy.' : ''));
            const valuePrefix = isCurrency ? '$' : '';

            tbody.innerHTML = '';
            data.forEach(item => {
                const row = document.createElement('tr');
                row.className = 'hover:bg-indigo-50/30 transition-colors';

                const formattedValue = isCurrency ? formatCurrency(item.y) : `${item.y.toLocaleString('es-CL', { maximumFractionDigits: 1 })}${valueSuffix}`;
                const progressBarColor = item.percentage > 50 ? 'bg-indigo-500' : (item.percentage > 20 ? 'bg-indigo-400' : 'bg-indigo-300');

                row.innerHTML = `
                    <td class="px-6 py-4 font-medium text-gray-900">${item.name}</td>
                    <td class="px-6 py-4 text-right font-mono font-bold text-indigo-700">${formattedValue}</td>
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <div class="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
                                <div class="${progressBarColor} h-full rounded-full" style="width: ${item.percentage}%"></div>
                            </div>
                            <span class="text-xs font-bold text-gray-600 min-w-[40px] text-right">${item.percentage.toFixed(1)}%</span>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);
            });

            // Aplicar orden inicial o persistente
            sortTable(currentSort.column, true);
        }

        function sortTable(columnIndex, isInitial = false) {
            const table = document.querySelector('table');
            const tbody = document.getElementById('tableBody');
            const rows = Array.from(tbody.querySelectorAll('tr'));
            const ths = table.querySelectorAll('th');

            if (!isInitial) {
                if (currentSort.column === columnIndex) {
                    currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
                } else {
                    currentSort.column = columnIndex;
                    currentSort.direction = 'asc';
                }
            }

            ths.forEach((th, idx) => {
                th.classList.remove('sort-active');
                const icon = th.querySelector('.sort-icon');
                if (icon) icon.className = 'fas fa-sort sort-icon';

                if (idx === currentSort.column) {
                    th.classList.add('sort-active');
                    if (icon) {
                        icon.className = currentSort.direction === 'asc' ? 'fas fa-sort-up sort-icon' : 'fas fa-sort-down sort-icon';
                    }
                }
            });

            const sortedRows = rows.sort((a, b) => {
                let cellA = a.cells[columnIndex].textContent.trim();
                let cellB = b.cells[columnIndex].textContent.trim();

                const cleanValue = (val) => {
                    if (val.includes('%')) return parseFloat(val.split('%')[0].replace(/\$|\./g, '').replace(',', '.'));
                    if (val.includes('$')) return parseFloat(val.replace(/\$|\./g, '').replace(',', '.'));
                    const num = parseFloat(val.replace(/\./g, '').replace(',', '.'));
                    return isNaN(num) ? val.toLowerCase() : num;
                };

                const valA = cleanValue(cellA);
                const valB = cleanValue(cellB);

                if (typeof valA === 'number' && typeof valB === 'number') {
                    return currentSort.direction === 'asc' ? valA - valB : valB - valA;
                }

                return currentSort.direction === 'asc'
                    ? String(valA).localeCompare(String(valB))
                    : String(valB).localeCompare(String(valA));
            });

            tbody.innerHTML = '';
            sortedRows.forEach(row => tbody.appendChild(row));
        }

        function exportTable(format) {
            const groupBy = document.getElementById('groupByField').options[document.getElementById('groupByField').selectedIndex].text;
            const metric = document.getElementById('metricType').options[document.getElementById('metricType').selectedIndex].text;
            const fileName = `Informe_Dinamico_${groupBy.replace(/ /g, '_')}`;

            const rows = [];
            const headers = [groupBy, metric, 'Participación (%)'];

            document.querySelectorAll('#tableBody tr').forEach(tr => {
                const cells = Array.from(tr.querySelectorAll('td')).map((td, i) => {
                    if (i === 2) return td.querySelector('span').textContent.replace('%', '');
                    return td.textContent.trim();
                });
                rows.push(cells);
            });

            if (format === 'csv') {
                let csvContent = headers.join(',') + '\n' + rows.map(r => r.join(',')).join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `${fileName}.csv`;
                link.click();
            } else if (format === 'excel') {
                const worksheet = XLSX.utils.aoa_to_sheet([headers, ...rows]);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Datos");
                XLSX.writeFile(workbook, `${fileName}.xlsx`);
            } else if (format === 'pdf') {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                doc.setFontSize(18);
                doc.text('Informe Dinámico - Geoportal Municipal', 14, 22);
                doc.setFontSize(11);
                doc.setTextColor(100);
                doc.text(`Análisis de ${metric} por ${groupBy}`, 14, 30);
                doc.autoTable({
                    head: [headers],
                    body: rows,
                    startY: 35,
                    theme: 'striped',
                    headStyles: { fillColor: [99, 102, 241] }
                });
                doc.save(`${fileName}.pdf`);
            }
        }

        function renderChart(data, title, total, type, metric) {
            const isCurrency = metric.includes('monto') || metric.includes('ejecutado');
            const isPercent = metric.includes('avance');
            const isAntiguedad = metric.includes('antiguedad');
            const isCount = metric === 'count' || metric.includes('profesionales');

            const valueSuffix = isPercent ? '%' : (isAntiguedad ? ' años' : (isCount ? ' proy.' : ''));
            const valuePrefix = isCurrency ? '$' : '';

            const commonConfig = {
                chart: {
                    backgroundColor: 'transparent',
                    style: { fontFamily: 'Outfit' }
                },
                title: {
                    text: title,
                    style: { fontSize: '20px', fontWeight: 'bold' }
                },
                subtitle: {
                    text: isCurrency ? `Valor Acumulado: ${formatCurrency(total)}` : `Métrica Global: ${total.toFixed(1)}${valueSuffix}`,
                    style: { fontSize: '16px' }
                },
                tooltip: {
                    pointFormat: `{series.name}: <b>{point.percentage:.1f}%</b><br>Valor: <b>${valuePrefix}{point.y:,.1f}${valueSuffix}</b>`
                }
            };

            let specificConfig = {};

            switch (type) {
                case 'pie_3d':
                    specificConfig = {
                        chart: { type: 'pie', options3d: { enabled: true, alpha: 45, beta: 0 } },
                        plotOptions: { pie: { depth: 35, dataLabels: { enabled: true, format: '{point.name}: {point.percentage:.1f}%' } } },
                        series: [{ name: 'Inversión', data: data }]
                    };
                    break;
                case 'donut_3d':
                    specificConfig = {
                        chart: { type: 'pie', options3d: { enabled: true, alpha: 45, beta: 0 } },
                        plotOptions: { pie: { innerSize: '60%', depth: 35, dataLabels: { enabled: true, format: '{point.name}: {point.percentage:.1f}%' } } },
                        series: [{ name: 'Inversión', data: data }]
                    };
                    break;
                case 'column_3d':
                    specificConfig = {
                        chart: { type: 'column', options3d: { enabled: true, alpha: 15, beta: 15, depth: 50, viewDistance: 25 } },
                        xAxis: { categories: data.map(d => d.name) },
                        series: [{ name: 'Inversión', data: data.map(d => d.y), colorByPoint: true }]
                    };
                    break;
                case 'bar_3d':
                    specificConfig = {
                        chart: { type: 'bar', options3d: { enabled: true, alpha: 10, beta: 10, depth: 50 } },
                        xAxis: { categories: data.map(d => d.name) },
                        series: [{ name: 'Inversión', data: data.map(d => d.y), colorByPoint: true }]
                    };
                    break;
                case 'line':
                    specificConfig = {
                        chart: { type: 'line' },
                        xAxis: { categories: data.map(d => d.name) },
                        series: [{ name: 'Inversión', data: data.map(d => d.y) }]
                    };
                    break;
                case 'area':
                    specificConfig = {
                        chart: { type: 'area' },
                        xAxis: { categories: data.map(d => d.name) },
                        series: [{ name: 'Inversión', data: data.map(d => d.y) }]
                    };
                    break;
                case 'funnel':
                    specificConfig = {
                        chart: { type: 'funnel' },
                        plotOptions: { funnel: { neckWidth: '30%', neckHeight: '25%', width: '70%', dataLabels: { enabled: true, format: '<b>{point.name}</b>: {point.percentage:.1f}%' } } },
                        series: [{ name: 'Inversión', data: data.map(d => [d.name, d.y]) }]
                    };
                    break;
                case 'pyramid':
                    specificConfig = {
                        chart: { type: 'pyramid' },
                        plotOptions: { pyramid: { dataLabels: { enabled: true, format: '{point.name}' } } },
                        series: [{ name: 'Inversión', data: data.map(d => [d.name, d.y]) }]
                    };
                    break;
                case 'treemap':
                    specificConfig = {
                        chart: { type: 'treemap' },
                        series: [{ layoutAlgorithm: 'squarified', data: data.map(d => ({ name: d.name, value: d.y, colorValue: d.y })) }]
                    };
                    break;
                case 'radial':
                    specificConfig = {
                        chart: { polar: true, type: 'line' },
                        xAxis: { categories: data.map(d => d.name), tickmarkPlacement: 'on', lineWidth: 0 },
                        yAxis: { gridLineInterpolation: 'polygon', lineWidth: 0, min: 0 },
                        series: [{ name: 'Inversión', data: data.map(d => d.y), pointPlacement: 'on' }]
                    };
                    break;
            }

            const finalConfig = Highcharts.merge(commonConfig, specificConfig);
            Highcharts.chart('chartContainer', finalConfig);
        }

        function generarInforme() {
            if (!allProjects || allProjects.length === 0) {
                alert('No hay datos cargados para generar el informe.');
                return;
            }

            const groupBy = document.getElementById('groupByField').value;
            const fieldLabel = document.getElementById('groupByField').options[document.getElementById('groupByField').selectedIndex].text;
            const groupedData = {};

            allProjects.forEach(p => {
                let value = p[groupBy] || 'Sin especificar';
                let monto = parseFloat(p.monto) || 0;
                if (!groupedData[value]) groupedData[value] = { count: 0, total: 0 };
                groupedData[value].count++;
                groupedData[value].total += monto;
            });

            console.table(groupedData);
            alert(`Informe generado para "${fieldLabel}" con ${Object.keys(groupedData).length} categorías analizadas. Los detalles se han exportado a la consola de desarrollador.`);
        }

        document.addEventListener('DOMContentLoaded', () => {
            // checkLoginStatus viene de router.js o utils.js
            if (typeof checkLoginStatus === 'function') {
                checkLoginStatus();
            }
            fetchProjects();
        });
    </script>

    <script src="../../../script/help.js"></script>
    <script>setTimeout(() => { if (typeof createHelpButton === 'function') createHelpButton('informe_dinamico'); }, 500);</script>
